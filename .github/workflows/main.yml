name: CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  cicd:

    runs-on: [macos-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Install Nuke
      run: dotnet tool install --global Nuke.GlobalTool --version 8.0.0

    - name: Clean packages
      run: rm -rf ${{github.workspace}}/artifacts/packages
 
    - name: CreateNugetPackages
      run: nuke --target CreateNugetPackages --configuration Release --output ${{github.workspace}}/artifacts/packages/ --cirunnumber ${{github.run_number}}

    - uses: actions/upload-artifact@v4
      with:
        path: ${{github.workspace}}/artifacts/packages
        if-no-files-found: error

    - name: Publish
      if: github.ref == 'refs/heads/main'
      run: dotnet nuget push ${{github.workspace}}/artifacts/packages/*.nupkg  --api-key ${{secrets.baget_api_key}} --source http://192.168.122.109:8003/v3/index.json
